<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>PINS & NEEDLES · RADIO</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Space+Mono&family=Audiowide&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/livekit-client@2/dist/livekit-client.umd.js"></script>
  <style>
    :root {
      --bg: #0b0c0f; --surface0: #13151c; --surface1: #1e212a; --surface2: #2a2e3a;
      --border: #2f3545; --text-main: #f0f2f5; --text-muted: #8a91a5;
      --accent-primary: #ff4d6d; --accent-live: #ff3b5c; --accent-gold: #ffcd4d;
      --premium: #c28aff; --admin: #ff8c42; --free: #2ed573;
      --font-sans: 'Inter', sans-serif; --font-mono: 'Space Mono', monospace;
      --font-electric: 'Audiowide', cursive;
      --radius-md: 16px; --radius-sm: 12px;
    }
    body { background: var(--bg); color: var(--text-main); font-family: var(--font-sans); line-height:1.5; overflow-x:hidden; }
    /* Your full original CSS here – paste it all if you want to keep exact look */
    /* For brevity, here's a minimal mobile-friendly override */
    button { min-height: 56px; font-size: 1.1rem; padding: 0 1.5rem; border-radius: 999px; }
    .stage-inner { aspect-ratio: 16/9; max-height: 40vh; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body>

<!-- Your original HTML structure (header, stage, waveform, player, tabs, panels, modals) -->
<!-- ... paste your full body content here if you want to keep it exact ... -->

<!-- Example simplified content – replace with yours -->
<header class="sticky top-0 bg-black/90 backdrop-blur-md p-4 flex justify-between items-center">
  <div class="text-2xl font-bold text-[var(--accent-primary)]">PINS & NEEDLES</div>
  <button id="djBtn" onclick="openM('djModal')" class="bg-white/10 hover:bg-white/20 px-6 py-3 rounded-full">DJ</button>
</header>

<div class="p-4">
  <button onclick="togLive()" id="liveBtn" class="w-full py-6 bg-gradient-to-r from-[var(--accent-primary)] to-[var(--accent-live)] text-black font-bold rounded-full text-xl">
    GO LIVE
  </button>
</div>

<script>
// ===================== FIXED LIVEKIT CLIENT-SIDE TOKEN + BROADCAST =====================

// LiveKit Client-Side Token & Connect (no server needed)
const LIVEKIT_WS = 'wss://pindigtal-w87ngpeu.livekit.cloud';
const LIVEKIT_API_KEY = 'APIwZMah6JcmKro';
const LIVEKIT_API_SECRET = '7CSnGzXUGa4eYJUhNFr4J8w5HjvtVOjIhnyxnBbFKDd';

let liveKitRoom = null;
let isLive = false;

async function getToken(identity) {
  const at = new LiveKit.AccessToken(LIVEKIT_API_KEY, LIVEKIT_API_SECRET, { identity });
  at.addGrant({
    roomJoin: true,
    room: 'pinsradio',
    canPublish: true,
    canSubscribe: true
  });
  return await at.toJwt();
}

async function togLive() {
  if (!logCode) {
    alert('Login as DJ first');
    return;
  }

  isLive = !isLive;
  const btn = document.getElementById('liveBtn');

  if (isLive) {
    try {
      // Resume audio context (mobile fix)
      if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();

      // Mix audio
      const dest = audioCtx.createMediaStreamDestination();
      if (audioEl) {
        const src = audioCtx.createMediaElementSource(audioEl);
        src.connect(dest);
      }
      if (micStream) {
        const src = audioCtx.createMediaStreamSource(micStream);
        src.connect(dest);
      }

      const mixedTrack = dest.stream.getAudioTracks()[0];

      // Token
      const identity = logName || 'DJ_Guest';
      const token = await getToken(identity);

      // Connect & publish
      liveKitRoom = new LiveKit.Room();
      await liveKitRoom.connect(LIVEKIT_WS, token);
      await liveKitRoom.localParticipant.publishTrack(mixedTrack);

      // Camera
      if (camStream) {
        await liveKitRoom.localParticipant.publishTrack(camStream.getVideoTracks()[0]);
        document.getElementById('liveVid').srcObject = camStream;
        document.getElementById('liveVid').classList.remove('hidden');
        document.getElementById('stageIdle').classList.add('hidden');
      }

      btn.className = 'live-btn live';
      document.getElementById('liveLbl').textContent = '■ End Broadcast';
      alert('LIVE! Broadcasting now.');
    } catch (e) {
      alert('Connect failed: ' + e.message);
      console.error(e);
      isLive = false;
    }
  } else {
    if (liveKitRoom) liveKitRoom.disconnect();
    liveKitRoom = null;
    btn.className = 'live-btn off';
    document.getElementById('liveLbl').textContent = 'Go Live';
  }
}

// Simple token generator (client-side for testing – in production move to server)
async function getToken(identity) {
  const at = new LiveKit.AccessToken(LIVEKIT_API_KEY, LIVEKIT_API_SECRET, { identity });
  at.addGrant({
    roomJoin: true,
    room: 'pinsradio',
    canPublish: true,
    canSubscribe: true
  });
  return await at.toJwt();
}

async function togLive() {
  const btn = document.getElementById('liveBtn');
  isLive = !isLive;

  if (isLive) {
    try {
      // Get mic
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      localAudioTrack = new LiveKit.LocalAudioTrack(stream.getAudioTracks()[0]);

      // Optional camera
      try {
        const camStream = await navigator.mediaDevices.getUserMedia({ video: true });
        localVideoTrack = new LiveKit.LocalVideoTrack(camStream.getVideoTracks()[0]);
      } catch (e) { console.log('No camera'); }

      // Token
      const token = await getToken('DJ_' + Date.now().toString(36).slice(-6));

      // Connect
      room = new LiveKit.Room();
      await room.connect(LIVEKIT_WS, token);

      // Publish
      await room.localParticipant.publishTrack(localAudioTrack);
      if (localVideoTrack) await room.localParticipant.publishTrack(localVideoTrack);

      btn.textContent = '■ END LIVE';
      btn.style.background = 'var(--accent-live)';
      alert('LIVE! Your mic (and camera if enabled) is broadcasting.');
    } catch (e) {
      alert('Live failed: ' + e.message);
      console.error(e);
      isLive = false;
    }
  } else {
    if (room) room.disconnect();
    room = null;
    btn.textContent = 'GO LIVE';
    btn.style.background = '';
  }
}

// Your other functions (togMic, addFiles, etc.) can stay as-is

// Init
window.addEventListener('load', () => {
  console.log('LiveKit ready – tap GO LIVE to broadcast');
});
</script>
</body>
</html>
