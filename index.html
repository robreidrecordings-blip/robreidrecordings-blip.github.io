<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>PINS & NEEDLES · RADIO</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Space+Mono&family=Audiowide&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/livekit-client@2/dist/livekit-client.umd.js"></script>
  <style>
    /* Your original CSS – paste full here if needed */
    :root {
      --bg: #0b0c0f; --accent-primary: #ff4d6d; --accent-live: #ff3b5c; --premium: #c28aff;
    }
    body { background: var(--bg); color: #f0f2f5; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
    header { background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 100; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
    .logo em { color: var(--accent-primary); font-style: normal; font-weight: 800; }
    .stage { background: #000; height: 40vh; position: relative; }
    .stage-vid video { width: 100%; height: 100%; object-fit: cover; display: none; }
    .stage-vid.on video { display: block; }
    .lplayer { padding: 1rem; background: #13151c; display: flex; gap: 1rem; align-items: center; }
    .pb { width: 50px; height: 50px; border-radius: 50%; background: var(--accent-primary); border: none; font-size: 1.5rem; color: black; cursor: pointer; }
    .tabs { padding: 1rem; background: #1e212a; display: flex; gap: 0.5rem; overflow-x: auto; }
    .tab { padding: 0.6rem 1.2rem; border-radius: 999px; background: #2a2e3a; color: #8a91a5; cursor: pointer; }
    .tab.on { background: var(--accent-primary); color: white; }
    .panel { padding: 1rem; display: none; }
    .panel.on { display: block; }
    .live-btn { width: 100%; padding: 1.5rem; background: var(--accent-primary); color: black; font-weight: bold; border: none; border-radius: 999px; cursor: pointer; }
    .live-btn.live { background: var(--accent-live); color: white; }
    .mic-btn, .cam-btn { width: 100%; padding: 1.5rem; background: #2a2e3a; color: white; border: none; border-radius: 999px; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <div class="logo"><em>PINS & NEEDLES</em> RADIO</div>
  <button class="hbtn" onclick="openM('djModal')">DJ</button>
</header>

<div class="stage">
  <div class="stage-idle" id="stageIdle">Black screen - Tap GO LIVE to start</div>
  <div class="stage-vid" id="stageVid"><video id="liveVid" autoplay playsinline muted></video></div>
</div>

<button class="pb" onclick="playPause()">▶</button>

<script>
  // Global audio unlock for Chrome/Android
document.addEventListener('touchstart', () => {
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume().then(() => console.log('Audio resumed'));
  }
}, { once: false });
function playPause() {
  if (!audioEl) {
    alert('No track loaded - add one in Booth');
    return;
  }

  if (audioEl.paused) {
    audioEl.play().catch(e => {
      alert('Playback blocked: ' + e.message + '\nTap anywhere on screen first');
    });
  } else {
    audioEl.pause();
  }
}
</script>

<div class="tabs">
  <div class="tab on" onclick="goTab('listen')">Listen</div>
  <div class="tab" onclick="goTab('booth')">Booth</div>
</div>

<div id="listen" class="panel on">
  <div id="rqList">No DJs yet — be the first to join!</div>
</div>

<div id="booth" class="panel">
  <button onclick="document.getElementById('fileInput').click()" class="add-btn">+ Add Music</button>
  <input type="file" id="fileInput" accept="audio/*" multiple hidden onchange="addFiles(this.files)">
  <button class="mic-btn" onclick="togMic()">Enable Mic</button>
  <button class="cam-btn" onclick="togCam()">Enable Camera</button>
  <button id="liveBtn" class="live-btn" onclick="togLive()">GO LIVE</button>
</div>

<div class="overlay" id="djModal">
  <div class="modal">
    <h2>DJ Login</h2>
    <input id="djCodeIn" placeholder="PNR-XXXX" type="text">
    <button onclick="doLogin()">Enter</button>
    <button onclick="closeM('djModal')">Cancel</button>
  </div>
</div>

<script>
  const WS_URL = 'wss://pindigtal-w87ngpeu.livekit.cloud';
  const API_KEY = 'APIwZMah6JcmKro';
  const API_SECRET = '7CSnGzXUGa4eYJUhNFr4J8w5HjvtVOjIhnyxnBbFKDd';

  let room = null;
  let isLive = false;
  let logName = null;
  let audioEl = null;
  let micStream = null;
  let camStream = null;

  // Client-side token generator
  async function getToken(identity) {
    const at = new LiveKit.AccessToken(API_KEY, API_SECRET, { identity });
    at.addGrant({
      roomJoin: true,
      room: 'pinsradio',
      canPublish: true,
      canSubscribe: true
    });
    return await at.toJwt();
  }

 async function togDJPlay() {
  if (audioCtx && audioCtx.state === 'suspended') {
    await audioCtx.resume();
  }

  if (!audioEl) {
    alert('No track loaded');
    return;
  }

  if (audioEl.paused) {
    audioEl.play().catch(e => {
      alert('Play failed: ' + e.message + '\nTap screen first');
    });
  } else {
    audioEl.pause();
  }
}
    }

    isLive = !isLive;
    const btn = document.getElementById('liveBtn');

    if (isLive) {
      try {
        // Unlock audio (mobile)
        if (!window.audioCtx) {
          window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          await window.audioCtx.resume();
        }

        // Get mic
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        // Optional cam
        try {
          camStream = await navigator.mediaDevices.getUserMedia({ video: true });
          document.getElementById('liveVid').srcObject = camStream;
          document.getElementById('liveVid').classList.remove('hidden');
          document.getElementById('stageIdle').classList.add('hidden');
        } catch {}

        // Token
        const token = await getToken(logName);

        // Connect
        room = new LiveKit.Room();
        await room.connect(WS_URL, token);

        // Publish mic
        const audioTrack = micStream.getAudioTracks()[0];
        await room.localParticipant.publishTrack(audioTrack);

        btn.textContent = '■ END LIVE';
        btn.style.background = 'var(--accent-live)';
        alert('LIVE! Broadcasting mic (and camera if enabled).');
      } catch (e) {
        alert('Cannot connect: ' + e.message);
        console.error(e);
        isLive = false;
      }
    } else {
      room?.disconnect();
      room = null;
      btn.textContent = 'GO LIVE';
      btn.style.background = '';
    }
  }

  function doLogin() {
    const code = document.getElementById('djCodeIn').value.trim();
    if (code) {
      logName = 'DJ_' + code.slice(-4);
      closeM('djModal');
      document.getElementById('rqList').innerHTML = 'DJ ' + logName + ' in queue. Go to Booth!';
    } else {
      alert('Enter code');
    }
  }

  function openM(id) { document.getElementById(id).classList.remove('hidden'); }
  function closeM(id) { document.getElementById(id).classList.add('hidden'); }

  function goTab(tab) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
    document.getElementById(tab).classList.add('on');
  }

  function addFiles(files) {
    const file = files[0];
    if (file && file.type.startsWith('audio/')) {
      const url = URL.createObjectURL(file);
      audioEl = new Audio(url);
      alert('Music loaded - enable mic and GO LIVE');
    }
  }

  function togMic() { alert('Mic toggle - implemented in togLive'); } // placeholder
  function togCam() { alert('Camera toggle - implemented in togLive'); }

  // Init
  document.addEventListener('touchstart', () => {
    if (window.audioCtx?.state === 'suspended') window.audioCtx.resume();
  }, { once: true });
</script>
</body>
</html>
