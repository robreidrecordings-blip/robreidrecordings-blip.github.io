<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pins & Needles Records</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;1,300;1,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #080808;
      --dark: #111;
      --lime: #D4F000;
      --orange: #FF8C42;
      --white: #F7F7F2;
      --muted: #777;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }

    /* noise overlay */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 1000px;
      width: 100%;
    }

    .logo {
      font-family: 'Anton', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 4px;
      color: var(--lime);
      margin-bottom: 1rem;
      line-height: 1.2;
    }
    .logo span { color: var(--white); }

    .tagline {
      font-size: 1.2rem;
      color: var(--muted);
      margin-bottom: 4rem;
      font-weight: 300;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .button-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      margin: 2rem 0;
    }

    .hub-button {
      flex: 1 1 280px;
      max-width: 380px;
      padding: 3rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      color: var(--black);
      font-family: 'Anton', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: transform 0.3s, box-shadow 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--lime); /* fallback for artists */
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    }

    .hub-button.artists {
      background: var(--lime);
      color: var(--black);
    }
    .hub-button.comedy {
      background: var(--orange);
      color: var(--black);
    }

    .hub-button:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    .hub-button .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .hub-button .sub {
      font-family: 'Barlow', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 1px;
      margin-top: 1rem;
      opacity: 0.8;
      text-transform: none;
    }

    .footer-note {
      margin-top: 4rem;
      color: var(--muted);
      font-size: 0.85rem;
      border-top: 1px solid rgba(212,240,0,0.15);
      padding-top: 2rem;
      width: 100%;
    }

    @media (max-width: 600px) {
      .logo { font-size: 2rem; }
      .hub-button { font-size: 1.8rem; padding: 2rem 1rem; }
      .hub-button .icon { font-size: 3rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Pins <span>&</span> Needles Records</div>
    <div class="tagline">One platform. Two stages. Your audience.</div>

    <div class="button-grid">
      <a href="/artists/" class="hub-button artists">
        <span class="icon">🎤</span>
        ARTISTS
        <span class="sub">Music / Radio</span>
      </a>
      <a href="/comedy/" class="hub-button comedy">
        <span class="icon">😂</span>
        COMEDIANS
        <span class="sub">Jokes / Live</span>
      </a>
    </div>

    <div class="footer-note">
      Choose your path — both pay £5 a minute from the people you know.
    </div>
  </div>
</body>
</html>
