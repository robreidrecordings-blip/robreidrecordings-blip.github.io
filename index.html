<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PINS & NEEDLES RADIO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0b0c0f;
  color:#fff;
  text-align:center;
}

header{
  padding:20px;
  font-weight:800;
  font-size:28px;
  letter-spacing:2px;
}

.section{
  margin:30px auto;
  max-width:500px;
  padding:20px;
  background:#15171f;
  border-radius:12px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:600;
  margin:5px;
}

.primary{
  background:#ff4d6d;
  color:#000;
}

.live{
  background:#ff3b5c;
  color:#fff;
}

.off{
  background:#333;
  color:#aaa;
}

input[type=range]{
  width:100%;
}

#nowPlaying{
  margin-top:10px;
  font-size:14px;
  color:#aaa;
}
</style>
</head>
<body>

<header>PINS & NEEDLES RADIO</header>

<!-- LISTENER PLAYER -->
<div class="section">
  <h3>Listener Player</h3>
  <button id="playBtn" class="primary">▶ Play</button>
  <br><br>
  Volume
  <input type="range" min="0" max="100" value="75" id="volume">
  <div id="listenerStatus">Stopped</div>
</div>

<!-- DJ BOOTH -->
<div class="section">
  <h3>DJ Booth</h3>

  <input type="file" accept="audio/*" id="fileInput">
  <div id="nowPlaying">No track loaded</div>

  <button id="djPlay" class="primary">▶ Play Track</button>
  <button id="goLive" class="off">● Go Live</button>

  <br><br>

  <button id="micBtn" class="off">🎙 Enable Mic</button>
  <div id="micStatus">Mic Off</div>
</div>

<script>
let listenerAudio = new Audio();
listenerAudio.src = "";
listenerAudio.volume = 0.75;
listenerAudio.loop = true;

let djAudio = null;
let isLive = false;
let micStream = null;

const playBtn = document.getElementById("playBtn");
const volume = document.getElementById("volume");
const listenerStatus = document.getElementById("listenerStatus");

const fileInput = document.getElementById("fileInput");
const nowPlaying = document.getElementById("nowPlaying");
const djPlay = document.getElementById("djPlay");
const goLive = document.getElementById("goLive");

const micBtn = document.getElementById("micBtn");
const micStatus = document.getElementById("micStatus");

/* LISTENER PLAY BUTTON */
playBtn.onclick = () => {
  if(listenerAudio.paused){
    listenerAudio.play().catch(()=>{});
    playBtn.textContent = "⏸ Pause";
    listenerStatus.textContent = "Playing";
  }else{
    listenerAudio.pause();
    playBtn.textContent = "▶ Play";
    listenerStatus.textContent = "Paused";
  }
};

volume.oninput = () => {
  listenerAudio.volume = volume.value / 100;
};

/* FILE UPLOAD */
fileInput.onchange = (e)=>{
  const file = e.target.files[0];
  if(!file) return;

  if(djAudio) djAudio.pause();

  djAudio = new Audio(URL.createObjectURL(file));
  nowPlaying.textContent = "Loaded: " + file.name;
};

/* DJ PLAY BUTTON */
djPlay.onclick = ()=>{
  if(!djAudio) return alert("Upload a track first");

  if(djAudio.paused){
    djAudio.play().catch(()=>{});
    djPlay.textContent = "⏸ Pause Track";
  }else{
    djAudio.pause();
    djPlay.textContent = "▶ Play Track";
  }
};

/* GO LIVE */
goLive.onclick = ()=>{
  isLive = !isLive;

  if(isLive){
    goLive.textContent = "● LIVE";
    goLive.className = "live";
  }else{
    goLive.textContent = "● Go Live";
    goLive.className = "off";
  }
};

/* MICROPHONE */
micBtn.onclick = async ()=>{
  if(!micStream){
    try{
      micStream = await navigator.mediaDevices.getUserMedia({audio:true});
      micStatus.textContent = "Mic On";
      micBtn.textContent = "🎙 Disable Mic";
      micBtn.className = "primary";
    }catch{
      alert("Mic permission denied");
    }
  }else{
    micStream.getTracks().forEach(t=>t.stop());
    micStream = null;
    micStatus.textContent = "Mic Off";
    micBtn.textContent = "🎙 Enable Mic";
    micBtn.className = "off";
  }
};
</script>

</body>
</html>
